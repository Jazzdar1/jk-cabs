<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver App | J&K Cabs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-color: #f7941d; --brand-gradient: linear-gradient(135deg, #f7941d 0%, #f36f21 100%); --brand-dark: #222222; --bg-light: #f4f7f6; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .card { background: var(--white); padding: 40px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--brand-color); text-align: center; }
        h1 { color: var(--brand-dark); font-weight: 900; margin-bottom: 10px; text-transform: uppercase; font-size: 1.8rem;}
        h1 span { color: var(--brand-color); }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.5; }
        
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 6px; font-size: 1.1rem; text-align: center; text-transform: uppercase; font-weight: 700; outline: none; transition: 0.3s;}
        input:focus { border-color: var(--brand-color); }
        
        button { width: 100%; padding: 15px; background: var(--brand-dark); color: var(--white); border: none; font-size: 1.1rem; font-weight: 800; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--brand-gradient); }
        
        .stop-btn { background: #ff4b4b; display: none; margin-top: 15px; }
        .stop-btn:hover { background: #d93838; }

        .status-box { margin-top: 25px; padding: 20px; background: #fafafa; border-radius: 8px; border: 1px solid #eee; display: none; text-align: left;}
        .status-box h3 { color: #26ca61; margin-bottom: 15px; text-align: center; font-weight: 800; text-transform: uppercase;}
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.95rem; color: #555; font-weight: 600;}
        .data-val { font-weight: 800; color: var(--brand-dark);}
        
        @media (max-width: 768px) {
            .card { padding: 25px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>J&K Cabs <span>Driver</span></h1>
        <p class="subtitle">Enter Tracking ID and keep this app open while driving to broadcast Live GPS to the customer.</p>
        
        <input type="text" id="trackingId" placeholder="Tracking ID (e.g. TRK-)">
        <button id="startBtn" onclick="startTracking()">Start Broadcast 📡</button>
        <button id="stopBtn" class="stop-btn" onclick="stopTracking()">End Trip 🛑</button>

        <div class="status-box" id="statusBox">
            <h3>Live GPS Active</h3>
            <div class="data-row"><span>Latitude:</span> <span class="data-val" id="latVal">0.00</span></div>
            <div class="data-row"><span>Longitude:</span> <span class="data-val" id="lngVal">0.00</span></div>
            <div class="data-row"><span>Speed:</span> <span class="data-val" id="speedVal" style="color:var(--brand-color);">0 km/h</span></div>
        </div>
        <a href="admin.html" style="display:block; margin-top:20px; color:var(--brand-color); text-decoration:none; font-weight:700;">← Back to Admin</a>
    </div>

    <script>
        let watchId = null;
        function startTracking() {
            const trackId = document.getElementById('trackingId').value;
            if(!trackId) return alert("Please enter Tracking ID.");
            if (!navigator.geolocation) return alert("Device does not support GPS.");

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('statusBox').style.display = 'block';
            document.getElementById('trackingId').disabled = true;

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) : 0; 

                    document.getElementById('latVal').innerText = lat.toFixed(5);
                    document.getElementById('lngVal').innerText = lng.toFixed(5);
                    document.getElementById('speedVal').innerText = `${speed} km/h`;

                    fetch('/api/driver/update-location', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tracking_id: trackId, lat: lat, lng: lng, speed: speed })
                    });
                },
                (error) => { alert("Please turn on GPS Location on your phone."); },
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        function stopTracking() {
            if(watchId !== null) navigator.geolocation.clearWatch(watchId);
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('statusBox').style.display = 'none';
            document.getElementById('trackingId').disabled = false;
            document.getElementById('trackingId').value = '';
            alert("Trip Ended.");
        }
    </script>
</body>
</html>
