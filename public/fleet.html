<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles | J&K Cabs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --brand-color: #f7941d; --brand-gradient: linear-gradient(135deg, #f7941d 0%, #f36f21 100%); --brand-dark: #222222; --bg-light: #f4f7f6; --text-dark: #333; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        /* THEMED HEADER */
        .top-bar { background: var(--brand-gradient); color: var(--white); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .top-bar-left span { margin-right: 25px; }
        .top-bar-right a { color: var(--white); text-decoration: none; margin-left: 20px; font-weight: 700; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px; transition: 0.3s;}
        
        header { background-color: var(--white); box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .navbar { display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 1200px; margin: auto; padding: 15px 0; }
        .navbar h1 { font-size: 2.2rem; color: var(--brand-dark); font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: -1px; } 
        .navbar h1 span { color: var(--brand-color); }
        .nav-links { display: flex; gap: 25px; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-dark); font-weight: 700; font-size: 0.95rem; text-transform: uppercase; padding-bottom: 5px; transition: 0.3s;}
        .nav-links a:hover, .nav-links a.active { color: var(--brand-color); border-bottom: 3px solid var(--brand-color); }

        /* CONTENT */
        .fleet-section { width: 90%; max-width: 1200px; margin: 40px auto 80px; text-align: center; flex: 1;}
        .section-title { font-size: 2.5rem; font-weight: 900; color: var(--brand-dark); margin-bottom: 10px; text-transform: uppercase; }
        .fleet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 35px; margin-top: 40px;}
        .fleet-card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: 0.4s; text-align: left; border-bottom: 4px solid transparent; }
        .fleet-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); border-bottom: 4px solid var(--brand-color); }
        .fleet-card img { width: 100%; height: 240px; object-fit: cover; }
        .fleet-details { padding: 25px; position: relative; background: #fff; }
        .fleet-title { font-size: 1.5rem; font-weight: 800; color: var(--brand-dark); margin-bottom: 15px; }
        .specs-list { list-style: none; margin-bottom: 20px; border-top: 1px solid #f1f1f1; border-bottom: 1px solid #f1f1f1; padding: 15px 0; }
        .specs-list li { display: flex; justify-content: space-between; font-size: 0.95rem; color: #555; margin-bottom: 10px; }
        .specs-list li span { font-weight: 700; color: var(--brand-dark); }
        .fleet-price { font-size: 1.8rem; font-weight: 900; color: var(--brand-color); text-align: center; margin-bottom: 20px; }
        .btn-card { display: block; text-align: center; background: var(--brand-dark); color: var(--white); text-decoration: none; padding: 15px; border-radius: 6px; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .btn-card:hover { background: var(--brand-gradient); }

        /* FIXED CAR ANIMATION FOOTER */
        .animated-footer { position: relative; background-color: var(--brand-dark); color: var(--white); padding: 50px 5% 70px 5%; text-align: center; overflow: hidden; margin-top: auto;}
        .animated-footer h3 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; color: var(--brand-color); }
        .animated-footer p { font-size: 1rem; color: #aaa; margin-bottom: 20px; }
        .road-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 55px; background: #333; border-top: 3px solid #555; }
        .road-line { position: absolute; top: 50%; left: 0; width: 100%; height: 4px; background-image: linear-gradient(90deg, #fff 50%, transparent 50%); background-size: 60px 4px; }
        .moving-car-wrapper { position: absolute; bottom: 8px; left: -150px; width: 95px; z-index: 10; animation: drive 10s linear infinite; }
        .taxi-img { width: 100%; transform: scaleX(-1); } /* Flips car to face forward! */
        @keyframes drive { 0% { transform: translateX(-150px); } 100% { transform: translateX(calc(100vw + 150px)); } }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .top-bar { flex-direction: column; text-align: center; gap: 10px; }
            .navbar { flex-direction: column; gap: 15px; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left"><span>📞 +91-7006268328</span><span>✉️ sofiparvaiz114@gmail.com</span></div>
        <div class="top-bar-right" id="authLinks"><a href="customer.html">Login</a></div>
    </div>
    <header>
        <div class="navbar">
            <h1 onclick="window.location.href='index.html'">J&K<span> Cabs</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="fleet.html" class="active">Vehicles</a></li>
                <li><a href="tracking.html">Track Ride</a></li>
            </ul>
        </div>
    </header>

    <section class="fleet-section">
        <h2 class="section-title">Our Premium Inventory</h2>
        <div class="fleet-grid" id="fleetGrid"><h3 style="color:#666; width: 100%;">Loading Database...</h3></div>
    </section>

    <footer class="animated-footer">
        <h3>J&K Taxi Service</h3>
        <p>© 2026 All Rights Reserved | Traveling across Srinagar, Ladakh & Jammu</p>
        <div class="road-container">
            <div class="road-line"></div>
            <div class="moving-car-wrapper">
                <img src="https://img.icons8.com/fluency/96/taxi.png" alt="Taxi" class="taxi-img">
            </div>
        </div>
    </footer>

    <script>
        async function init() {
            const user = JSON.parse(localStorage.getItem('customer'));
            if(user) document.getElementById('authLinks').innerHTML = `<a href="customer.html">Dashboard</a>`;
            try {
                const res = await fetch('/api/fleet'); const cars = await res.json();
                document.getElementById('fleetGrid').innerHTML = cars.map(car => `
                    <div class="fleet-card"><img src="${car.img}">
                        <div class="fleet-details"><div class="fleet-title">${car.name}</div>
                            <ul class="specs-list"><li>Type <span>${car.type}</span></li><li>Seats <span>${car.seats}</span></li><li>Trans <span>${car.trans}</span></li><li>Fuel <span>${car.fuel}</span></li></ul>
                            <div class="fleet-price">${car.price}</div>
                            <a href="index.html?vehicle=${encodeURIComponent(car.name)}" class="btn-card">BOOK NOW</a>
                        </div></div>`).join('');
            } catch(e) { document.getElementById('fleetGrid').innerHTML = "<h3 style='color:red;'>Database offline on Vercel.</h3>"; }
        }
        init();
    </script>
</body>
</html>
